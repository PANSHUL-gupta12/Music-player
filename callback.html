<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting to Spotify...</title>
    <style>
        /* ─── Callback page styling ─── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #121212;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(29, 185, 84, 0.2);
            border-top-color: #1DB954;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { color: #1DB954; margin-bottom: 0.5rem; }
        p { color: #b3b3b3; font-size: 0.9rem; }
        .error { color: #e74c3c; }
        .success { color: #1DB954; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h2 id="title">Connecting to Spotify...</h2>
        <p id="message">Exchanging authorization code for access token</p>
    </div>

    <!--
        ══════════════════════════════════════
        HOW THIS CALLBACK PAGE WORKS:
        ══════════════════════════════════════
        1. User clicked "Connect Spotify" on the main player page
        2. A popup opened and redirected to Spotify's login
        3. User logged in and authorized our app
        4. Spotify redirected this popup to THIS page with ?code=xxx in the URL
        5. This page reads the code, exchanges it for access tokens
        6. Sends the tokens back to the main window via postMessage
        7. Closes the popup automatically
        ══════════════════════════════════════
    -->
    <script src="/ASSETS/js/config.js"></script>
    <script>
        (async function handleCallback() {
            const titleEl = document.getElementById('title');
            const messageEl = document.getElementById('message');
            const spinnerEl = document.getElementById('spinner');

            try {
                // Read the authorization code from URL params
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                const error = params.get('error');

                if (error) {
                    throw new Error('Authorization denied: ' + error);
                }

                if (!code) {
                    throw new Error('No authorization code received');
                }

                // Get the code verifier that was stored before the redirect
                let codeVerifier = sessionStorage.getItem('spotify_code_verifier') || 
                                   localStorage.getItem('spotify_code_verifier');

                if (!codeVerifier && window.opener) {
                    try {
                        codeVerifier = window.opener.sessionStorage.getItem('spotify_code_verifier') || 
                                       window.opener.localStorage.getItem('spotify_code_verifier');
                    } catch (e) {
                        console.warn('[Callback] Could not read verifier from opener:', e.message);
                    }
                }

                if (!codeVerifier) {
                    throw new Error('Code verifier not found — please try logging in again');
                }

                // Exchange the authorization code for tokens
                messageEl.textContent = 'Exchanging code for access token...';

                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({
                        client_id: SPOTIFY_CONFIG.CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: SPOTIFY_CONFIG.REDIRECT_URI,
                        code_verifier: codeVerifier
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error_description || 'Token exchange failed');
                }

                const tokenData = await response.json();

                // Store tokens in localStorage (accessible by the main window)
                localStorage.setItem('spotify_access_token', tokenData.access_token);
                if (tokenData.refresh_token) {
                    localStorage.setItem('spotify_refresh_token', tokenData.refresh_token);
                }
                localStorage.setItem(
                    'spotify_token_expiry',
                    (Date.now() + tokenData.expires_in * 1000).toString()
                );

                // Clean up the code verifier
                sessionStorage.removeItem('spotify_code_verifier');
                localStorage.removeItem('spotify_code_verifier');

                // Notify the main window that login succeeded
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'spotify-auth-success',
                        token: tokenData.access_token
                    }, window.location.origin);
                }

                // Show success state
                spinnerEl.style.display = 'none';
                titleEl.textContent = '✅ Connected!';
                titleEl.classList.add('success');
                messageEl.textContent = 'Closing this window...';

                // Close popup after a brief delay
                setTimeout(() => window.close(), 1500);

            } catch (err) {
                console.error('[Callback] ❌ Error:', err);

                spinnerEl.style.display = 'none';
                titleEl.textContent = '❌ Connection Failed';
                titleEl.classList.add('error');
                messageEl.textContent = err.message;
                messageEl.classList.add('error');

                // Notify main window of the error
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'spotify-auth-error',
                        error: err.message
                    }, window.location.origin);
                }

                // Close after showing error
                setTimeout(() => window.close(), 4000);
            }
        })();
    </script>
</body>
</html>
