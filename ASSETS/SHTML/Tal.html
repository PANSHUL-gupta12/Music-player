<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Listen to Talwiinder's top tracks — Dhundhala, Khayal, Wishes and more on In The Zone.">
    <title>Talwiinder — In The Zone</title>
    <link rel="stylesheet" href="/ASSETS/css/style.css">
    <link rel="stylesheet" href="/ASSETS/css/animations.css">
    <script src="/ASSETS/js/config.js" defer></script>
    <script src="/ASSETS/js/spotify-api.js" defer></script>
    <script src="/ASSETS/js/spotify-auth.js" defer></script>
    <script src="/ASSETS/js/Tal.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <nav>
        <div class="nav-brand">
            <a href="/index.html"><img src="/Images/logo.jpg" alt="In The Zone Logo" class="brand-logo"></a>
            <span class="site-title">In The Zone</span>
        </div>
        <ul>
            <li><a href="/index.html">Home</a></li>
            <li><a href="/contact.html">Contact</a></li>
            <li><a href="/feedback.html">Feedback</a></li>
            <li><button id="spotify-connect-btn" class="spotify-btn" title="Login for full song playback"><i class="fab fa-spotify"></i> Connect Spotify</button></li>
        </ul>
    </nav>

    <div class="player">
        <div class="wrapper"><div class="tabs-container"><button class="tab-btn active" id="dev-tab" onclick="switchTab('dev')">Developer Picks</button><button class="tab-btn" id="top-tab" onclick="switchTab('top')">Top 20 Trending</button></div>
            <div class="details">
                <div class="now-playing">PLAYING x OF y</div>

                <div class="track-art">
                    <img id="track-image" src="" alt="track art">
                </div>

                <div class="track-name">Track Name</div>
                <div class="track-artist">Track Artist</div>
            </div>

            <div class="slider_container">
                <div class="current-time">00:00</div>
                <input type="range" min="1" max="100" value="0" class="seek_slider" onchange="seekTo()">
                <div class="total-duration">00:00</div>
            </div>

            <div class="slider_container">
                <i class="fa fa-volume-down"></i>
                <input type="range" min="1" max="100" value="99" class="volume_slider" onchange="setVolume()">
                <i class="fa fa-volume-up"></i>
            </div>

            <div class="buttons">
                <div class="random-track" onclick="randomTrack()">
                    <i class="fas fa-random fa-2x" title="Shuffle"></i>
                </div>
                <div class="prev-track" onclick="prevTrack()">
                    <i class="fa fa-step-backward fa-2x"></i>
                </div>
                <div class="playpause-track" onclick="playpauseTrack()">
                    <i class="fa fa-play"></i>
                </div>
                <div class="next-track" onclick="nextTrack()">
                    <i class="fa fa-step-forward fa-2x"></i>
                </div>
                <div class="repeat-track" onclick="repeatTrack()">
                    <i class="fa fa-repeat fa-2x" title="Repeat"></i>
                </div>
            </div>

            <div id="wave">
                <span class="stroke"></span>
                <span class="stroke"></span>
                <span class="stroke"></span>
                <span class="stroke"></span>
                <span class="stroke"></span>
                <span class="stroke"></span>
                <span class="stroke"></span>
            </div>
        </div>
    </div>
    <button id="playlistBtn" class="floating-playlist-btn" title="My Playlist"><i class="fa fa-music"></i></button>
    <div id="playlistPanel" class="playlist-panel">
        <div class="playlist-content">
            <div class="playlist-header"><h3>My Playlist</h3><button id="closePlaylist" class="close-btn"><i class="fa fa-xmark"></i></button></div>
            <label class="file-upload-label" for="fileInput"><i class="fa fa-plus"></i> Add Songs from Device</label>
            <input type="file" id="fileInput" accept="audio/*" multiple style="display:none;"><ul id="playlist"></ul>
        </div>
    </div>
    <script src="/ASSETS/js/playlist.js" defer></script>
    <script src="/ASSETS/js/spotify-player.js" defer></script>
</body>
</html>
