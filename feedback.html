<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Share your feedback about In The Zone music player — report bugs or rate your experience.">
    <title>Feedback — In The Zone</title>
    <link rel="stylesheet" href="ASSETS/css/Styles.css">
    <link rel="stylesheet" href="ASSETS/css/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-brand">
            <a href="index.html">
                <img src="Images/logo.jpg" alt="In The Zone Logo" class="brand-logo">
            </a>
            <span class="site-title">In The Zone</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </nav>

    <div class="Area">
        <h2>Feedback / Bug Report</h2>
        <form action="#" method="post" enctype="multipart/form-data" id="feedback-form">

            <div class="form-section">
                <label for="photo">Upload Screenshot (if any bugs encountered):</label>
                <input type="file" id="photo" name="photo" accept="image/*">
            </div>

            <div class="form-section">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="form-section">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="form-section">
                <label>Gender:</label>
                <div class="radio-group">
                    <label for="male">
                        <input type="radio" id="male" name="gender" value="Male" required> Male
                    </label>
                    <label for="female">
                        <input type="radio" id="female" name="gender" value="Female" required> Female
                    </label>
                </div>
            </div>

            <div class="form-section">
                <label>Experience:</label>
                <div class="radio-group">
                    <label for="very-satisfied">
                        <input type="radio" id="very-satisfied" name="feedback" value="Very Satisfied" required> Very Satisfied
                    </label>
                    <label for="satisfied">
                        <input type="radio" id="satisfied" name="feedback" value="Satisfied" required> Satisfied
                    </label>
                    <label for="bad">
                        <input type="radio" id="bad" name="feedback" value="Bad" required> Bad
                    </label>
                </div>
            </div>

            <div class="form-section">
                <label for="contact">Contact Number:</label>
                <input type="tel" id="contact" name="contact" required>
            </div>

            <div class="form-section">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <input type="submit" value="Submit Feedback" id="submit-feedback">
        </form>
    </div>

    <div class="footer">
        Made with ❤️ by Panshul Gupta · In The Zone
    </div>

    <!-- Floating Playlist Button -->
    <button id="playlistBtn" class="floating-playlist-btn" title="My Playlist">
        <i class="fa fa-music"></i>
    </button>

    <!-- Playlist Panel -->
    <div id="playlistPanel" class="playlist-panel">
        <div class="playlist-content">
            <div class="playlist-header">
                <h3>My Playlist</h3>
                <button id="closePlaylist" class="close-btn"><i class="fa fa-xmark"></i></button>
            </div>
            <label class="file-upload-label" for="fileInput">
                <i class="fa fa-plus"></i> Add Songs from Device
            </label>
            <input type="file" id="fileInput" accept="audio/*" multiple style="display:none;">
            <ul id="playlist"></ul>
        </div>
    </div>

    <script src="ASSETS/js/playlist.js" defer></script>
</body>
</html>
